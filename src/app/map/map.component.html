<div class="container">


  <div class="selectors">

    <mat-form-field appearance="fill">
      <mat-label> {{ 'map.period' | transloco }} </mat-label>
      <mat-select placeholder="Periode" [(value)]="selectedperiod" >
        <mat-option *ngFor="let selectorperiod of selectorperiodsvar" [value]="selectorperiod.value"> {{ selectorperiod.viewValue }} </mat-option>
      </mat-select>
    </mat-form-field>

    <mat-chip-listbox selectable multiple class="mat-chip-list-stacked">

      <ng-container *ngFor="let poet of poets | async">
        <mat-chip-option [ngClass]="{'invisible': selectedperiod == 'earlyedo' && !(poet.death < 1700) || selectedperiod == 'middleedo' && !(poet.death > 1700 && poet.death < 1800 )|| selectedperiod == 'lateedo' && !(poet.death > 1800 && poet.death < 1868)}" color="primary" [value]="poet.name"  (click)="chipselection(poet)"> {{ poet[nameVar] }} {{ poet.name }}  </mat-chip-option>

      </ng-container>
    </mat-chip-listbox>

  </div>


<div class="mapcontainer">

  <div style="height: 400px"
  leaflet
  [leafletOptions]="options"
  (leafletMapReady)="onMapReady($event)">
 
  <!-- eleganter? ngfor mit layerpoets dictionary in ts?-->
  <!-- <ng-container *ngFor="let layerpoet of layerpoets | async">-->
  <div *ngIf="selectedPoet.includes('Ōkubo Shibutsu')" [leafletLayers]="Shibutsu"></div>

</div>

<!--
<div class="mapframe">
<div id="map" class="map"></div>
</div>
-->

</div>
